5.5 Guardsquare Protected QA:
  stage: build
  # tags:
  #   - devsecops-common
  # image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 2.4 Prepare Remote
    - job: 2.6 Retrieve Signing Keys
    - job: 3.1 Calculate Beta Version
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 3.5 Get Version Code
    - job: 4.1 Gradle Test
    - job: 5.2 Fastlane Build QA AAB
      optional: true
    - job: 5.3 Gradle Build QA
      optional: true
    - job: 5.4 Guardsquare Instrumented QA
      optional: true
  variables:
    # ANDROID_HOME: "/usr/lib/android-sdk"
    # ANDROID_SDK_ROOT: "/usr/lib/android-sdk"
    GUARDSQUARE_TYPE: "protected"
    GUARDSQUARE_ENV: "quality"
  before_script:
    - !reference [.guardsquare_setup, before_script]
  script:
    - !reference [.guardsquare_run, script]
  artifacts:
    paths:
      - "${RELEASE_PATH}/*.aab"
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - scheduler_failure
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_protected_to_development, rules]
    - !reference [.rules_protected_hotfix_to_quality, rules]
    - !reference [.rules_protected_to_quality, rules]
    - when: never
  allow_failure: true

# ======================================================================
# STAGE: upload
# ======================================================================
6.1 Upload DEV to Package Registry:
  stage: upload
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 5.1 Gradle Build DEV
      optional: true
    - job: 3.1 Calculate Beta Version
  allow_failure: true

6.2 Upload QA to Package Registry:
  stage: upload
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 5.3 Gradle Build QA
      optional: true
    - job: 3.1 Calculate Beta Version
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 3.6 Hotfix Semantic Release
      optional: true
  allow_failure: true

6.3 Upload DEV to Firebase:
  stage: upload
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 2.4 Prepare Remote
    - job: 2.5 Retrieve Firebase Secrets
    - job: 5.1 Gradle Build DEV
      optional: true
  variables:
    FIREBASE_APP_ID: "${FIREBASE_DEV_APP_ID}"
    APK_SEARCH_PATTERN: "*gms*development*.apk"
    FASTLANE_LANE: "upload_dev_to_firebase"
