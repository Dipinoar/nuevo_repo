# Android Superapp Pipeline GRADLE
# v3.0 - Modularizado

default:
    tags:
      - ec2-android
    image: $RUNNER_ANDROID_SECURE
    cache:
      paths:
        - .gradle/wrapper
        - .gradle/caches

stages:
  - compliance
  - prepare_pipeline
  - calculate_version
  - test
  - build
  - upload
  - build_prod
  - veracode
  - upload_prod
  - summary

include:
  - local: 'files/PF/yamls/.mobile-superapp-android-include.yml'

before_script:
    !reference [.before_pipeline, before_script]

#========================== PIPELINE JOBS ============================

# ======================================================================
# STAGE: compliance
# ======================================================================
1.1 Setting Compliance Variables:
  stage: compliance
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  script:
    - echo "COMPLIANCE_TECNOLOGY=mobile" >> compliance.env
    - echo "COMPLIANCE_LANGUAGES=$CI_PROJECT_REPOSITORY_LANGUAGES" >> compliance.env
    - echo "COMPLIANCE_PROJECT=$CI_PROJECT_PATH" >> compliance.env
  artifacts:
    reports:
      dotenv: compliance.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - when: always

1.2 Validate Compliance:
  stage: compliance
  needs: [1.1 Setting Compliance Variables]
  variables:
    REPO_ID: $CI_PROJECT_ID
  trigger:
    project: arq-devops-team/pipelines-gitlab/rule-validation
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - when: always

# ======================================================================
# STAGE: prepare_pipeline
# ======================================================================
2.1 No Protected Target Environment:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  variables:
    MESSAGE: >
      This merge request targets a non-protected environment (*${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}*).<br>
      Please ensure merges follow the authorized flow: *feature/bugfix → development → quality → production*.
  script:
    - !reference [.current_dir, script]
    - printenv
    - !reference [.create_directory, script]
    - !reference [.downloads_utils_dependency, script]
    - !reference [.downloads_comment_dependency, script]
    - !reference [.prepare_requirements_summary, script]
    - !reference [.return_to_pipeline_dir, script]
    - !reference [.comment_to_mr, script]
  rules:
    - if: $MERGE_REQUEST_NOT_PROTECTED == "true"
    - when: never

2.2 Blocked Merge Request:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  interruptible: false
  variables:
    MESSAGE: >
      This merge request has been blocked due to unauthorized source/target combination:<br>
      *${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}* → *${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}*.<br>
      Only merges from *feature/bugfix* to *development*, *development* to *quality* and from *quality* to *production* are allowed.
  script:
    - !reference [.current_dir, script]
    - printenv
    - !reference [.create_directory, script]
    - !reference [.downloads_utils_dependency, script]
    - !reference [.downloads_comment_dependency, script]
    - !reference [.prepare_requirements_summary, script]
    - !reference [.return_to_pipeline_dir, script]
    - !reference [.comment_to_mr, script]
    - exit 1
  rules:
    - if: $MERGE_REQUEST_BLOCKED == "true"
    - when: never

2.3 Check Rebase Status:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  script:
    - !reference [.comment_mr_function, script]
    - !reference [.validate_env_vars, script]
    - !reference [.get_info_mr, script]
    - !reference [.verify_conflicts, script]
    - !reference [.verify_behind_commits, script]
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_skip_unofficial_to_production, rules]
    - !reference [.rules_require_mr_id, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - when: never

2.4 Prepare Remote:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 2.3 Check Rebase Status
      optional: true
    - job: 1.2 Validate Compliance
      optional: true
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.before_pipeline, before_script]
    - !reference [.superapp_prepare_remote_runtime, before_script]
  script:
    - !reference [.downloads_read_config, script]
    - !reference [.prepare_remote_env, script]
    - printenv
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
    expire_in: 1 day
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_commit_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never

2.5 Retrieve Firebase Secrets:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_AWS_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  script:
    - !reference [.retrieve_firebase_secrets, script]
  artifacts:
    name: "Secrets"
    access: none
    paths:
      - secrets.env
    reports:
      dotenv: secrets.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - when: never
  allow_failure: true

2.6 Retrieve Signing Keys:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_AWS_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  script:
    - !reference [.retrieve_signing_keys, script]
  artifacts:
    name: "Signing Keys"
    access: none
    paths:
      - signing_keys.env
    reports:
      dotenv: signing_keys.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never

# ======================================================================
# STAGE: calculate_version
# ======================================================================
3.1 Calculate Beta Version:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.before_pipeline, before_script]
    - git fetch --all --tags --prune --quiet
  script:
    - !reference [.check_beta_number, script]
    - !reference [.get_tag_source_branch, script]
    - !reference [.get_available_tags, script]
    - !reference [.get_max_beta_number, script]
    - !reference [.calculate_beta_plus_one, script]
    - !reference [.create_artifacts, script]
    - !reference [.export_to_env, script]
  after_script:
    - !reference [.latest_verification, script]
  artifacts:
    paths:
      - .app_version_env
    reports:
      dotenv: .app_version_env
    expire_in: 1 day
  rules:
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never

3.2 Simulate Semantic Release:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $NODE_SECURE_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.downloads_semantic_dependency, script]
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      chmod +x semantic_release.sh
      ./semantic_release.sh
  script:
    - !reference [.downloads_deploytestrc_dependency, script]
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      echo "[INFO!] Simulate Semantic Release"

      OUTPUT=$(semantic-release --dry-run --no-ci --branches "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME")
      echo "$OUTPUT"

      VERSION=$(echo "$OUTPUT" | grep -o "he next release version is [0-9]*\.[0-9]*\.[0-9]*" | awk '{print $6}' || true)

      echo "APP_VERSION=${VERSION}" >> .app_version_env
      echo "VERSION_NAME=${VERSION}" >> .app_version_env
      echo "BASE_VERSION=${VERSION}" >> .app_version_env
      echo "VERSION_WITH_V=v${VERSION}" >> .app_version_env
    - echo "[INFO] Show .app_version_env"
    - cat .app_version_env
  artifacts:
    paths:
      - .app_version_env
    reports:
      dotenv: .app_version_env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - when: never

3.3 Semantic Release:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $NODE_SECURE_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.downloads_semantic_dependency, script]
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      chmod +x semantic_release.sh
      ./semantic_release.sh
  script:
    - !reference [.downloads_releaserc_dependency, script]
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      semantic-release

    - echo "[INFO] Show .app_version_env"
    - cat .app_version_env
  artifacts:
    paths:
      - .app_version_env
    reports:
      dotenv: .app_version_env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_commit_development, rules]
    - when: never

3.4 Get Version:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $NODE_SECURE_IMAGE
  needs:
    - job: 2.4 Prepare Remote
      optional: true
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.git_auth, before_script]
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      VERSION=$(git tag --contains $(git rev-parse --short HEAD) | grep -v 'b[0-9]\+$' | cut -d 'v' -f2 | head -n 1)
      if [[ $VERSION == "" ]]; then
        echo "[ERROR!] No version has been defined for this commit."
        exit 1
      fi
      echo "APP_VERSION=${VERSION}" >> .app_version_env
      echo "VERSION_WITH_V=v${VERSION}" >> .app_version_env
      echo "VERSION_NAME=${VERSION}" >> .app_version_env
      echo "BASE_VERSION=${VERSION}" >> .app_version_env
    - cat .app_version_env
  artifacts:
    paths:
      - .app_version_env
    reports:
      dotenv: .app_version_env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - when: never

3.5 Get Version Code:
  stage: calculate_version
  needs:
    - job: 2.4 Prepare Remote
  before_script:
    - !reference [.install_fastlane, before_script]
    - !reference [.decode_google_play_credentials, before_script]
  script:
    - !reference [.get_play_version_code, script]
  after_script:
    - rm -f "${CI_PROJECT_DIR}/google-play-credentials.json"
  artifacts:
    paths:
      - .version_code_env
    reports:
      dotenv: .version_code_env
    expire_in: 1 day
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never

3.6 Hotfix Semantic Release:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_IMAGE
  needs:
    - job: 2.4 Prepare Remote
  variables:
    GIT_DEPTH: "0"
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.before_pipeline, before_script]
  script:
    - !reference [.hotfix_semantic_version, script]
  artifacts:
    paths:
      - .app_version_env
    reports:
      dotenv: .app_version_env
    expire_in: 1 day
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - when: never

# ======================================================================
# STAGE: test
# ======================================================================
4.1 Gradle Test:
  stage: test
  needs:
    - job: 2.4 Prepare Remote
  before_script:
    - !reference [.before_pipeline, before_script]
    - !reference [.superapp_android_runtime, before_script]
  script:
    - !reference [.gradle_detekt_test, script]
  artifacts:
    paths:
      - test.txt
      - test.html
      - test.json
      - build.env
    expire_in: 1 day
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - scheduler_failure
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_commit_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never
  allow_failure: true

