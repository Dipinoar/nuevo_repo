10.1 Comment Summary:
  stage: summary
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_SECURE
  needs:
    # Version info
    - job: 3.1 Calculate Beta Version
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 3.6 Hotfix Semantic Release
      optional: true
    # DEV/QA uploads
    - job: 6.1 Upload DEV to Package Registry
      optional: true
    - job: 6.2 Upload QA to Package Registry
      optional: true
    - job: 6.3 Upload DEV to Firebase
      optional: true
    - job: 6.4 Upload QA to Firebase
      optional: true
    - job: 6.5 Upload QA AAB to Package Registry
      optional: true
    - job: 6.6 Deploy QA AAB to Google Play
      optional: true
    - job: 6.7 Upload QA Instrumented to Package Registry
      optional: true
    - job: 6.8 Upload QA Protected to Package Registry
      optional: true
    # Veracode prepare (non-blocking for DEV/QA, already blocking for PROD via upload needs)
    - job: 8.1 Prepare files for Veracode (Google)
      optional: true
    - job: 8.2 Prepare files for Veracode (Huawei)
      optional: true
    - job: 8.5 Prepare files for Veracode (AAB)
      optional: true
    # PROD uploads (these already wait for Send to Veracode)
    - job: 9.1 Upload PROD to Package Registry
      optional: true
    - job: 9.2 Upload PROD Unofficial to Package Registry
      optional: true
    - job: 9.3 Deploy PROD to Google Play
      optional: true
    - job: 9.4 Upload PROD AAB to Package Registry
      optional: true
    - job: 9.5 Upload PROD AAB Unofficial to Package Registry
      optional: true
    - job: 9.6 Upload PROD Instrumented to Package Registry
      optional: true
    - job: 9.7 Upload PROD Protected to Package Registry
      optional: true
  before_script:
    - !reference [.git_auth, before_script]
    - !reference [.before_pipeline, before_script]
  script:
    - !reference [.downloads_enumerables_dependency, script]
    - !reference [.downloads_environment_dependency, script]
    - !reference [.downloads_summary_dependency, script]
    - !reference [.downloads_dependencies, script]
    - !reference [.prepare_requirements_summary, script]
    - !reference [.resolve_comment_script, script]
    - !reference [.build_artifacts_markdown, script]
    - !reference [.post_comment_to_mr, script]
  rules:
    - if: $MAKE_REBASE == "true"
      when: never
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_feature_bugfix_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_hotfix_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_mr_unofficial_to_production, rules]
    - when: never
