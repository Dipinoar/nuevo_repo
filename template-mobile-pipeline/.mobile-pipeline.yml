# PJ Android Pipeline Modules
# v2.0 - Android Only (Linux runners) - Modularizado

default:
  tags:
    - ec2-android
  image: "gitlab.itauchile.cl:5050/gitlab-registry-central/docker-images/runner-devops/runner-android:1.0.0-secure"
  cache:
    paths:
      - .gradle/wrapper

stages:
  - compliance
  - prepare_pipeline
  - calculate_version
  - test
  - build
  - veracode
  - deploy
  - summary

include:
  - local: 'files/PJ/yamls/.mobile-pipeline-modules-include.yml'

#========================== PIPELINE JOBS ============================

# ======================================================================
# STAGE: compliance
# ======================================================================
1.1 Setting Compliance Variables:
  stage: compliance
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  script:
    - echo "COMPLIANCE_TECNOLOGY=mobile" >> compliance.env
    - echo "COMPLIANCE_LANGUAGES=$CI_PROJECT_REPOSITORY_LANGUAGES" >> compliance.env
    - echo "COMPLIANCE_PROJECT=$CI_PROJECT_PATH" >> compliance.env
  artifacts:
    reports:
      dotenv: compliance.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - when: always

1.2 Validate Compliance:
  stage: compliance
  needs: [1.1 Setting Compliance Variables]
  variables:
    REPO_ID: $CI_PROJECT_ID
  trigger:
    project: arq-devops-team/pipelines-gitlab/rule-validation
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - when: always

# ======================================================================
# STAGE: prepare_pipeline
# ======================================================================
2.1 No Protected Target Environment:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  variables:
    MESSAGE: >
      This merge request targets a non-protected environment (*${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}*).<br>
      Please ensure merges follow the authorized flow: *feature/bugfix → development → quality → production*.
  script:
    - !reference [.current_dir, script]
    - printenv
    - !reference [.create_directory, script]
    - !reference [.downloads_utils_dependency, script]
    - !reference [.downloads_comment_dependency, script]
    - !reference [.install_pipeline_python_deps, script]
    - !reference [.return_to_pipeline_dir, script]
    - !reference [.comment_to_mr, script]
  rules:
    - if: $MERGE_REQUEST_NOT_PROTECTED == "true"
    - when: never

2.2 Blocked Merge Request:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  interruptible: false
  variables:
    MESSAGE: >
      This merge request has been blocked due to unauthorized source/target combination:<br>
      *${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}* → *${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}*.<br>
      Only merges from *feature/bugfix* to *development*, *development* to *quality* and from *quality* to *production* are allowed.
  script:
    - !reference [.current_dir, script]
    - printenv
    - !reference [.create_directory, script]
    - !reference [.downloads_utils_dependency, script]
    - !reference [.downloads_comment_dependency, script]
    - !reference [.install_pipeline_python_deps, script]
    - !reference [.return_to_pipeline_dir, script]
    - !reference [.comment_to_mr, script]
    - exit 1
  rules:
    - if: $MERGE_REQUEST_BLOCKED == "true"
    - when: never

2.3 Check Rebase Status:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  script:
    - !reference [.comment_mr_function, script]
    - !reference [.validate_env_vars, script]
    - !reference [.get_info_mr, script]
    - !reference [.verify_conflicts, script]
    - !reference [.verify_behind_commits, script]
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - when: never

2.4 Prepare Environment:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  needs:
    - job: 2.3 Check Rebase Status
      optional: true
  script:
    - !reference [.prepare_pj_environment, script]
    - printenv
  artifacts:
    access: none
    reports:
      dotenv: build.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_commit_development, rules]
    - !reference [.rules_commit_quality, rules]
    - !reference [.rules_commit_production, rules]

2.5 Retrieve Artifacts:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  needs: [2.4 Prepare Environment]
  script:
    - !reference [.retrieve_pj_artifacts, script]
  artifacts:
    name: "Dependencies"
    untracked: true
    access: none
    exclude:
      - "$PIPELINE_LOCAL_SCRIPTS_FOLDER/**/*"
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_commit_development, rules]
    - !reference [.rules_commit_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_commit_production, rules]

2.6 Retrieve Secrets:
  stage: prepare_pipeline
  tags:
    - devsecops-common
  image: $RUNNER_DEFAULT_IMAGE_SECURE
  needs: [2.4 Prepare Environment]
  before_script:
    - !reference [.set_environment_variables, before_script]
  script:
    - !reference [.retrieve_pj_secrets, script]
  artifacts:
    name: "Secrets"
    untracked: true
    access: none
    exclude:
      - "$PIPELINE_LOCAL_SCRIPTS_FOLDER/**/*"
    reports:
      dotenv: secrets.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_commit_development, rules]
    - !reference [.rules_commit_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_commit_production, rules]

