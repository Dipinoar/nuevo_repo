3.2 Simulate Semantic Release:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_NODE_SECURE
  # needs:
  #   - job: 3.1 Calculate Beta Version
  #     optional: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git-core ca-certificates
    - !reference [.downloads_semantic_dependency, script]
    - |
      chmod +x semantic_release.sh
      ./semantic_release.sh
  script:
    - !reference [.downloads_deploytestrc_dependency, script]
    - |
      echo "[INFO!] Simulate Semantic Release"
      OUTPUT=$(semantic-release --dry-run --no-ci --branches "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME")
      echo "$OUTPUT"
      echo "[INFO!] Simulate Semantic Release for this commit"
      VERSION=$(echo $OUTPUT | grep -o "he next release version is [0-9]*\.[0-9]*\.[0-9]*" | awk '{print $6}')
      # echo "[INFO!] Simulated semantic version: ${VERSION:-<none>}"
      # echo "[INFO!] Beta version (authoritative) from 3.1: ${APP_VERSION:-<none>}"
      # echo "SEMANTIC_VERSION=${VERSION}" >> .semantic_version_env
      # cat .semantic_version_env
      echo "APP_VERSION=${VERSION}"
      echo "APP_VERSION=$VERSION" >> .app_version_env
      cat .app_version_env
  artifacts:
    reports:
      # dotenv: .semantic_version_env
      dotenv: .app_version_env
  rules:
    - !reference [.rules_mr_to_development, rules]

3.3 Semantic Release:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_NODE_SECURE
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git-core ca-certificates
    - !reference [.downloads_semantic_dependency, script]
    - |
      chmod +x semantic_release.sh
      ./semantic_release.sh
  script:
    - !reference [.downloads_releaserc_dependency, script]
    - |
      semantic-release
      cat .app_version_env
  artifacts:
    reports:
      dotenv: .app_version_env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_commit_development, rules]

3.4 Get Version:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_NODE_SECURE
  script:
    - |
      git fetch --tags
      if [[ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]]; then
        VERSION=$(git tag --list 'v*' --sort=-v:refname --merged "origin/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" | head -n 1 | cut -d 'v' -f2)
      else
        VERSION=$(git tag --contains $(git rev-parse --short HEAD) | cut -d 'v' -f2 | head -n 1)
      fi
      if [[ $VERSION == "" ]]; then
        echo "[ERROR!] No version has been defined for this commit."
        exit 1
      fi
    - |
      echo "APP_VERSION=${VERSION}"
      echo APP_VERSION=$VERSION >> .app_version_env
    - cat .app_version_env
  artifacts:
    reports:
      dotenv: .app_version_env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    - !reference [.rules_commit_quality, rules]
    - !reference [.rules_commit_production, rules]

3.5 Version Promotion Summary:
  stage: calculate_version
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_SECURE
  needs:
    - job: 3.2 Simulate Semantic Release
      optional: true
    - job: 3.3 Semantic Release
      optional: true
  script:
    - !reference [.version_promotion_summary, script]
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]

# ======================================================================
# STAGE: test
# ======================================================================
4.1 Test:
  stage: test
  tags:
    - devsecops-common
  allow_failure: true
  needs:
    - job: 2.4 Prepare Environment
    - job: 2.5 Retrieve Artifacts
    - job: 2.6 Retrieve Secrets
  before_script:
    - !reference [.before_android, before_script]
    - !reference [.set_environment_variables, before_script]
    - !reference [.set_java_version, before_script]
    - !reference [.setup_android_linux_env, before_script]
    - !reference [.download_cacerts, before_script]
    - !reference [.ensure_android_sdk, script]
  script:
    - !reference [.gradle_detekt_test, script]
  artifacts:
    paths:
      - test.txt
    expire_in: 1 day
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]

# ======================================================================
# STAGE: build
# ======================================================================
5.1 Build and Upload:
  stage: build
  needs:
    - job: 2.3 Check Rebase Status
      optional: true
    - job: 2.4 Prepare Environment
    - job: 2.5 Retrieve Artifacts
    - job: 2.6 Retrieve Secrets
    # [DISABLED-BETA] - job: 3.1 Calculate Beta Version
    #   optional: true
    - job: 3.2 Simulate Semantic Release
      optional: true
    - job: 3.3 Semantic Release
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 4.1 Test
  before_script:
    - !reference [.before_android, before_script]
    - !reference [.set_environment_variables, before_script]
    - !reference [.set_java_version, before_script]
    - !reference [.setup_android_linux_env, before_script]
    - !reference [.download_cacerts, before_script]
    - !reference [.ensure_android_sdk, script]
  script:
    - !reference [.prebuild_android_application, script]
    - !reference [.init_ssh_agent_guardsquare, script]
    - !reference [.build_and_publish_sequential, script]
    - !reference [.run_pj_build, script]
    - !reference [.copy_gradle_module_metadata, script]
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - scheduler_failure
  artifacts:
    paths:
      - dwtoveracode/*
      - ${RELEASE_DIRECTORY}/*
    reports:
      dotenv: build.env
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    # [DISABLED-BETA] rules_commit_development removido — no publicar en push a development
    # - !reference [.rules_commit_development, rules]

# ======================================================================
# STAGE: veracode
# ======================================================================
6.1 Generate Binaries for Veracode:
  stage: veracode
  needs:
    - job: 2.4 Prepare Environment
    - job: 5.1 Build and Upload
  script:
    - !reference [.prepare_pj_veracode, script]
  artifacts:
    paths:
      - dwtoveracode/*
    reports:
      dotenv: build.env
  rules:
    - if: '$veracodeoff == "true"'
      when: never
    - if: '$CI_MERGE_REQUEST_TITLE =~ /noveracode/i && $CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]

6.2 Send to Veracode:
  stage: veracode
  needs:
    - job: 6.1 Generate Binaries for Veracode
      optional: true
  variables:
    VERACODE_FILEPATH: artifact/dwtoveracode/
    CI_ARTIFACT_PROJECT_ID: "${CI_PROJECT_ID}"
    CI_ARTIFACT_PIPELINE_ID: "${CI_PIPELINE_ID}"
    CI_ARTIFACT_JOB_ID: "${CI_JOB_ID}"
    VERACODE_TEAMS: "superapp ITAUCL"
  trigger:
    project: arq-devops-team/pipelines-gitlab/template-pipeline-veracode
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  rules:
    - if: '$veracodeoff == "true"'
      when: never
    - if: '$CI_MERGE_REQUEST_TITLE =~ /noveracode/i && $CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]

# ======================================================================
# STAGE: deploy
# ======================================================================
7.1 Verify Package Registry:
  stage: deploy
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_SECURE
  allow_failure: true
  needs:
    - job: 2.4 Prepare Environment
    # [DISABLED-BETA] - job: 3.1 Calculate Beta Version
    #   optional: true
    - job: 3.2 Simulate Semantic Release
      optional: true
    - job: 3.3 Semantic Release
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 5.1 Build and Upload
      optional: true
  before_script:
    - !reference [.set_environment_variables, before_script]
  script:
    - !reference [.verify_package_registry, script]
  rules:
    - !reference [.rules_skip_on_tag, rules]
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
    # [DISABLED-BETA] rules_commit_* removidos — no verificar en push a ramas protegidas
    # - !reference [.rules_commit_development, rules]
    # - !reference [.rules_commit_quality, rules]
    # - !reference [.rules_commit_production, rules]

# ======================================================================
# STAGE: summary
# ======================================================================
8.1 Comment Summary:
  stage: summary
  tags:
    - devsecops-common
  image: $RUNNER_ANDROID_SECURE
  needs:
    - job: 2.4 Prepare Environment
    # [DISABLED-BETA] - job: 3.1 Calculate Beta Version
    #   optional: true
    - job: 3.2 Simulate Semantic Release
      optional: true
    - job: 3.4 Get Version
      optional: true
    - job: 5.1 Build and Upload
      optional: true
    - job: 7.1 Verify Package Registry
      optional: true
  before_script:
    - !reference [.set_environment_variables, before_script]
  script:
    - !reference [.comment_pj_summary, script]
  rules:
    - !reference [.rules_mr_to_development, rules]
    - !reference [.rules_mr_development_to_quality, rules]
    - !reference [.rules_mr_quality_to_production, rules]
