# =============================================================================
# Preparación de keystore y DexGuard license para builds
# Trabaja en CI_PROJECT_DIR (no requiere DEVOPS_DIR)
# =============================================================================
.prepare_debug_keystore: &prepare_debug_keystore
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] $BASH_COMMAND (exit=$?)" >&2' ERR

      mkdir -p "${RELEASE_PATH}"

      echo "[STEP] Preparing debug keystore"
      cp ${ANDROID_PROJECT_PATH}/tools/debug-keystore/itau_debug.keystore ${CI_PROJECT_DIR}/itau_debug.keystore

      echo "[STEP] Preparing DexGuard license"
      echo "$DEXGUARD_LICENSE_B64" | base64 -d > ${CI_PROJECT_DIR}/dexguard-license.txt

      export KEY_ALIAS="itau_debug"
      export KEY_PASSWORD="debugSuperApp"
      export KEY_STORE_PASSWORD="debugSuperApp"

.prepare_release_keystore: &prepare_release_keystore
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] $BASH_COMMAND (exit=$?)" >&2' ERR

      mkdir -p "${RELEASE_PATH}"

      echo "[STEP] Preparing release keystore"
      echo "$RELEASE_KEYSTORE_B64" | base64 -d > ${CI_PROJECT_DIR}/release.keystore

      echo "[STEP] Preparing DexGuard license"
      echo "$DEXGUARD_LICENSE_B64" | base64 -d > ${CI_PROJECT_DIR}/dexguard-license.txt

      echo "[STEP] Loading signing keys from environment (resolved by 2.6 Retrieve Signing Keys)"
      export KEY_ALIAS="${KEY_ALIAS:-release}"
      export KEY_STORE_PATH="${CI_PROJECT_DIR}/release.keystore"

      if [ -z "${KEY_PASSWORD}" ] || [ -z "${KEY_STORE_PASSWORD}" ]; then
        echo "[ERROR] KEY_PASSWORD or KEY_STORE_PASSWORD not set. Ensure job '2.6 Retrieve Signing Keys' ran successfully."
        exit 1
      fi

      echo "[INFO] KEY_ALIAS=${KEY_ALIAS}"
      echo "[INFO] KEY_PASSWORD length=${#KEY_PASSWORD}"
      echo "[INFO] KEY_STORE_PASSWORD length=${#KEY_STORE_PASSWORD}"
      echo "[INFO] KEY_STORE_PATH=${KEY_STORE_PATH}"

.prepare_quality_keystore: &prepare_quality_keystore
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] $BASH_COMMAND (exit=$?)" >&2' ERR

      mkdir -p "${RELEASE_PATH}"

      echo "[STEP] Preparing quality keystore"
      if [ -z "${QUALITY_KEYSTORE_B64:-}" ]; then
        echo "[ERROR] QUALITY_KEYSTORE_B64 is not set. Configure this CI/CD variable."
        exit 1
      fi
      echo "$QUALITY_KEYSTORE_B64" | base64 -d > ${CI_PROJECT_DIR}/superAppHomologKey.keystore

      echo "[STEP] Preparing DexGuard license"
      echo "$DEXGUARD_LICENSE_B64" | base64 -d > ${CI_PROJECT_DIR}/dexguard-license.txt

      echo "[STEP] Loading quality signing keys from environment"
      export QUALITY_KEY_STORE_PATH="${CI_PROJECT_DIR}/superAppHomologKey.keystore"

      if [ -z "${QUALITY_KEY_PASSWORD}" ] || [ -z "${QUALITY_KEY_STORE_PASSWORD}" ]; then
        echo "[ERROR] QUALITY_KEY_PASSWORD or QUALITY_KEY_STORE_PASSWORD not set."
        exit 1
      fi

      echo "[INFO] QUALITY_KEY_ALIAS=${QUALITY_KEY_ALIAS}"
      echo "[INFO] QUALITY_KEY_PASSWORD length=${#QUALITY_KEY_PASSWORD}"
      echo "[INFO] QUALITY_KEY_STORE_PASSWORD length=${#QUALITY_KEY_STORE_PASSWORD}"
      echo "[INFO] QUALITY_KEY_STORE_PATH=${QUALITY_KEY_STORE_PATH}"
