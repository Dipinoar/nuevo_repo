# =============================================================================
# Hotfix Semantic Version
# Calculates next patch version, creates tag, pushes it, creates GitLab Release.
# Used exclusively for hotfix/* → quality flow.
# =============================================================================
.hotfix_semantic_version: &hotfix_semantic_version
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      echo "============================================================"
      echo "[INFO] Hotfix Semantic Version - Calculating next patch..."
      echo "============================================================"

      git fetch --all --tags --prune --quiet

      # Find latest semantic tag (vX.Y.Z without beta) sorted desc
      LATEST_TAG="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"

      if [ -z "$LATEST_TAG" ]; then
        echo "[WARN] No semantic version tags found. Using v1.0.0 as base."
        LATEST_TAG="v1.0.0"
      fi

      echo "[INFO] Latest semantic tag: $LATEST_TAG"

      # Extract major.minor.patch
      VERSION_NO_V="${LATEST_TAG#v}"
      MAJOR="$(echo "$VERSION_NO_V" | cut -d. -f1)"
      MINOR="$(echo "$VERSION_NO_V" | cut -d. -f2)"
      PATCH="$(echo "$VERSION_NO_V" | cut -d. -f3)"

      # Increment patch
      NEW_PATCH=$(( PATCH + 1 ))
      NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
      NEW_TAG="v${NEW_VERSION}"

      echo "[INFO] New version: $NEW_VERSION (tag: $NEW_TAG)"

      # Ensure tag does not already exist
      while git tag | grep -q "^${NEW_TAG}$" || git ls-remote --tags origin | grep -q "refs/tags/${NEW_TAG}$"; do
        echo "[WARN] Tag $NEW_TAG already exists. Incrementing patch..."
        NEW_PATCH=$(( NEW_PATCH + 1 ))
        NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
        NEW_TAG="v${NEW_VERSION}"
      done

      echo "[INFO] Final version: $NEW_VERSION (tag: $NEW_TAG)"

      # Calculate VERSION_NUMBER as next global beta number (max bN + 1)
      MAX_BETA=0
      ALL_BETA_TAGS="$(git tag -l 'v*b*' 2>/dev/null | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]+$' || true)"
      if [ -n "$ALL_BETA_TAGS" ]; then
        for btag in $ALL_BETA_TAGS; do
          BN="$(echo "$btag" | sed -E 's/.*b([0-9]+)$/\1/')"
          if echo "$BN" | grep -qE '^[0-9]+$' && [ "$BN" -gt "$MAX_BETA" ]; then
            MAX_BETA="$BN"
          fi
        done
      fi
      VERSION_NUMBER=$(( MAX_BETA + 1 ))
      echo "[INFO] Highest beta globally: b${MAX_BETA} -> VERSION_NUMBER=${VERSION_NUMBER}"

      # Create tag
      TAG_MESSAGE="Hotfix Release ${NEW_TAG}
      Pipeline: #${CI_PIPELINE_ID}
      URL: ${CI_PIPELINE_URL}
      Branch: ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      Commit: $(git rev-parse --short HEAD)
      Triggered by: ${GITLAB_USER_NAME:-unknown}
      Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      git tag -a "$NEW_TAG" -m "$TAG_MESSAGE"

      # Push tag
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git config --global http.sslVerify false
      echo "[INFO] Pushing tag $NEW_TAG to remote..."
      git push origin "$NEW_TAG" || { echo "[ERROR] Failed to push tag"; exit 1; }

      echo "[INFO] Tag $NEW_TAG pushed successfully."

      # Create GitLab Release
      echo "[INFO] Creating GitLab Release for $NEW_TAG..."
      RELEASE_DESCRIPTION="## Hotfix Release ${NEW_TAG}\n\n- **Branch:** ${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}\n- **Pipeline:** [#${CI_PIPELINE_ID}](${CI_PIPELINE_URL})\n- **Commit:** $(git rev-parse --short HEAD)\n- **Triggered by:** ${GITLAB_USER_NAME:-unknown}\n- **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" --request POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"tag_name\": \"${NEW_TAG}\",
          \"name\": \"Release ${NEW_TAG}\",
          \"description\": \"${RELEASE_DESCRIPTION}\"
        }")

      HTTP_CODE=$(echo "$RELEASE_RESPONSE" | tail -1)
      RESPONSE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')

      if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
        echo "[INFO] GitLab Release created successfully for $NEW_TAG"
      else
        echo "[WARN] Failed to create GitLab Release (HTTP $HTTP_CODE): $RESPONSE_BODY"
        echo "[WARN] Continuing without release. Tag was pushed successfully."
      fi

      # Generate .app_version_env
      cat > .app_version_env <<EOF
      APP_VERSION=${NEW_VERSION}
      BASE_VERSION=${NEW_VERSION}
      VERSION_NUMBER=${VERSION_NUMBER}
      VERSION_NAME=${NEW_VERSION}
      PIPELINE_ID=${CI_PIPELINE_ID}
      TAG_PUSHED=true
      VERSION_WITH_V=${NEW_TAG}
      EOF

      # Trim leading whitespace from heredoc
      sed -i 's/^[[:space:]]*//' .app_version_env

      echo ""
      echo "===== HOTFIX VERSION SUMMARY ====="
      echo "Previous version: ${LATEST_TAG}"
      echo "New version: ${NEW_TAG}"
      echo "Build number: ${VERSION_NUMBER}"
      echo "Tag pushed: true"
      echo "=================================="
      echo ""
      cat .app_version_env
