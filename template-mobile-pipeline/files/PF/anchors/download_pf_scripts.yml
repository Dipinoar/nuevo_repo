# =============================================================================
# Descarga individual de scripts PF via curl (estilo PJ)
# Cada anchor descarga un script puntual. Se consume con !reference solo donde se necesita.
# Para agregar un script nuevo: crear un anchor nuevo aquí.
# =============================================================================

.downloads_read_config: &downloads_read_config
  script:
    - |
      echo "[INFO] Downloading read_config.py"
      curl -fL -o read_config.py \
        "${PIPELINE_API_REPO_URL}/files%2FPF%2Fscripts%2Fread_config.py/raw?ref=${PIPELINE_BRANCH}" \
        --header "Authorization: Bearer $TOKEN_GITLAB" || echo "[ERROR] Failed to download read_config.py"

.downloads_parametrized_build_google: &downloads_parametrized_build_google
  script:
    - |
      echo "[INFO] Downloading parametrized_build_google.sh"
      curl -fL -o parametrized_build_google.sh \
        "${PIPELINE_API_REPO_URL}/files%2FPF%2Fscripts%2Fparametrized_build_google.sh/raw?ref=${PIPELINE_BRANCH}" \
        --header "Authorization: Bearer $TOKEN_GITLAB" || echo "[ERROR] Failed to download parametrized_build_google.sh"
      chmod +x parametrized_build_google.sh

