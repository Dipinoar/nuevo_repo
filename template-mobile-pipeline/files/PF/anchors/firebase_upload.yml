      echo "[INFO] FIREBASE_APP_ID: ${FIREBASE_APP_ID}"
      echo "[INFO] FASTLANE_LANE: ${FASTLANE_LANE}"
      echo "[INFO] Distribution group: ${FIREBASE_GROUPS}"
