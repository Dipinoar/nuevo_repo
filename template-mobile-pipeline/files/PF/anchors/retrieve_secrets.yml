# Recuperar Firebase distribution token desde AWS Secrets Manager
.retrieve_firebase_secrets: &retrieve_firebase_secrets
  script:
    - |
      set -eo pipefail

      echo "[INFO] Retrieving Firebase distribution token from AWS Secrets Manager"
      FIREBASE_DISTRIBUTION_TOKEN=$(aws secretsmanager get-secret-value --region us-east-1 --secret-id "${ARN_FIREBASE_DISTRIBUTION_TOKEN}" | jq -r .SecretString | jq -r .TOKEN)

      echo "[DEBUG] Firebase distribution token length: ${#FIREBASE_DISTRIBUTION_TOKEN}"

      if [ -n "$FIREBASE_DISTRIBUTION_TOKEN" ]; then
        echo "[INFO] Exporting Firebase distribution token to environment file"
        echo "FIREBASE_DISTRIBUTION_TOKEN=$FIREBASE_DISTRIBUTION_TOKEN" > secrets.env
      else
        echo "[ERROR] Missing Firebase distribution token"
        exit 1
      fi

      echo "[INFO] Verifying secrets.env file:"
      ls -la secrets.env
      echo "[INFO] File has $(wc -l < secrets.env) lines"
