.prepare_requirements: &prepare_requirements
  script:
    - |
      echo "[INFO] Installing pipreqs and preparing Python requirements"
      python3 -m pip install pipreqs
      echo "[INFO] Generating requirements.txt without version pinning"
      pipreqs --mode no-pin .
      echo "[INFO] Installing dependencies from requirements.txt"
      python3 -m pip install -r requirements.txt
      echo "[INFO] Upgrading python-gitlab package"
      python3 -m pip install --upgrade python-gitlab

.prepare_requirements_summary: &prepare_requirements_summary
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      echo "[INFO] Installing Python dependencies for pipeline helpers"
      if python3 -m pip --version >/dev/null 2>&1; then
        python3 -m pip install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests \
          || python3 -m pip install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests
      elif command -v pip3 >/dev/null 2>&1; then
        pip3 install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests \
          || pip3 install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests
      elif command -v pip >/dev/null 2>&1; then
        pip install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests \
          || pip install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum requests
      else
        echo "[ERROR] No pip executable available in runner image"
        exit 1
      fi

.return_to_pipeline_dir: &return_to_pipeline_dir
  script:
    - |
      echo "[INFO] Returning to pipeline working directory"
      cd "${CURRENT_DIR}"

.comment_to_mr: &comment_to_mr
  script:
    - |
      echo "[INFO] Posting comment to GitLab Merge Request"
      if [ -f "${PIPELINE_LOCAL_SCRIPTS_FOLDER}/gitlab_add_comment.py" ]; then
        python3 "${PIPELINE_LOCAL_SCRIPTS_FOLDER}/gitlab_add_comment.py" \
          -u  "${CI_SERVER_URL}" \
          -t  "${TOKEN_GITLAB}" \
          -p  "${CI_PROJECT_ID}" \
          -mr "${CI_MERGE_REQUEST_IID}" \
          -m  "${MESSAGE}"
      elif [ -f "${PIPELINE_LOCAL_SCRIPTS_FOLDER}/comment.py" ]; then
        python3 "${PIPELINE_LOCAL_SCRIPTS_FOLDER}/comment.py" \
          -u  "${CI_SERVER_URL}" \
          -t  "${TOKEN_GITLAB}" \
          -p  "${CI_PROJECT_ID}" \
          -mr "${CI_MERGE_REQUEST_IID}" \
          -m  "${MESSAGE}"
      else
        echo "[ERROR] No comment script found (gitlab_add_comment.py/comment.py)"
        exit 1
      fi

.source_python_activate: &source_python_activate
  script:
    - |
      echo "[INFO] Activating Python virtual environment"
      source python_runner/bin/activate

.current_dir: &current_dir
  script:
    - |
      echo "[INFO] Saving current working directory"
      CURRENT_DIR=$(pwd)

.retrieve_env_vars: &retrieve_env_vars
  script:
    - |
      echo "[INFO] Retrieving environment variables from ci/config.yaml"
      python3 "${PIPELINE_LOCAL_SCRIPTS_FOLDER}/yaml_to_env.py" -f "ci/config.yaml" -e $ENVIRONMENT

.prepare_py_env: &prepare_py_env
  script:
    - |
      echo "[INFO] Creating and activating Python virtual environment"
      python3 -m venv python_runner && source python_runner/bin/activate

.prepare_python_files: &prepare_python_files
  script:
    - |
      echo "[INFO] Installing pipreqs and preparing Python requirements"
      python -m pip install pipreqs
      echo "[INFO] Generating requirements.txt"
      pipreqs .
      echo "[INFO] Installing dependencies from requirements.txt"
      python -m pip install -r requirements.txt
      echo "[INFO] Installing python-gitlab package"
      python3 -m pip install python-gitlab

.before_pipeline: &before_pipeline
  before_script:
    - echo "[INFO] Setting GitLab branch environment variables"
    - export GITLAB_BRANCH="$CI_COMMIT_BRANCH"
    - export GITLAB_SOURCE_BRANCH="$CI_COMMIT_BRANCH"
    - export GITLAB_TARGET_BRANCH="$CI_COMMIT_BRANCH"
    - |
      if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then
        echo "[INFO] Merge request detected. Updating branch variables"
        export IS_MERGE_REQUEST="true"
        export GITLAB_BRANCH="$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        export GITLAB_SOURCE_BRANCH="$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        export GITLAB_TARGET_BRANCH="$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
      fi

.git_auth: &git_auth
  before_script:
    - echo "[INFO] Configuring Git global user"
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@example.com}"
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"

.set_environment_variables: &set_environment_variables
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      echo "Set variables per environment"
      export AWS_SECRET_ROLE="AWS_SECRET_ROLE${ENVIRONMENT_SUFFIX}"
