.update_apt: &update_apt
    before_script:
        - |
            echo "[INFO] Disabling AdoptOpenJDK repository and updating APT package list"
            sed -i 's/^\(deb .*adoptopenjdk.*\)$/# \1/g' /etc/apt/sources.list
            apt update -y

.update_java_temurin: &update_java_temurin
    before_script:
        - |
            echo "[INFO] Adding Temurin GPG key to trusted sources"
            wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | tee /etc/apt/trusted.gpg.d/adoptium.gpg > /dev/null

            echo "[INFO] Adding Temurin repository to APT sources"
            echo "deb https://packages.adoptium.net/artifactory/deb $(awk -F= '/^VERSION_CODENAME/{print$2}' /etc/os-release) main" | tee /etc/apt/sources.list.d/adoptium.list

            echo "[INFO] Updating APT package list"
            apt update -y

            echo "[INFO] Installing Temurin JDK version ${TEMURIN_VERSION}"
            apt install -y "temurin-${TEMURIN_VERSION}-jdk"

            echo "[INFO] Setting Temurin JDK as the default Java version"
            update-java-alternatives -s "temurin-${TEMURIN_VERSION}-jdk-amd64"

.update_gradle_version: &update_gradle_version
    before_script:
        - |
            echo "[INFO] Updating Gradle to version ${GRADLE_VERSION}"

            echo "[INFO] Installing zip utility (required by SDKMAN)"
            apt-get update && apt-get install -y zip curl

            echo "[INFO] Removing any previous SDKMAN installation"
            rm -rf /root/.sdkman

            echo "[INFO] Installing SDKMAN for managing development tools"
            max_retries=5
            attempt=0
            success=false

            while [ $attempt -lt $max_retries ]; do
                echo "[INFO] Attempt $(($attempt + 1)) of $max_retries: Installing SDKMAN..."
                if curl -s "https://get.sdkman.io" | bash; then
                    success=true
                    break
                fi
                echo "[WARN] SDKMAN installation failed. Retrying in 5 seconds..."
                sleep 5
                attempt=$(($attempt + 1))
            done

            if [ "$success" = false ]; then
                echo "[ERROR] SDKMAN installation failed after $max_retries attempts."
                exit 1
            fi

            if [ ! -f "/root/.sdkman/bin/sdkman-init.sh" ]; then
                echo "[ERROR] SDKMAN init script not found after installation."
                exit 1
            fi
            source "/root/.sdkman/bin/sdkman-init.sh"

            echo "[INFO] Cleaning existing Gradle installation"
            rm -rf /opt/gradle/*

            echo "[INFO] Installing Gradle ${GRADLE_VERSION} via SDKMAN"
            sdk install gradle "${GRADLE_VERSION}"

            echo "[INFO] Copying Gradle binaries to /opt/gradle"
            cp -r "/root/.sdkman/candidates/gradle/${GRADLE_VERSION}/"* /opt/gradle

            echo "[INFO] Sourcing Gradle environment variables"
            source /etc/profile.d/gradle.sh

.get_chile_dependencies: &get_chile_dependencies
    before_script:
        - |
            echo "[INFO] Cloning DevOps template repository"
            cd .. && mkdir devops && cd devops
            export DEVOPS_DIR=$(pwd)
            git clone --depth 1 "http://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PIPELINE_REPOSITORY}.git" -b "${PIPELINE_BRANCH}"

            echo "[INFO] Removing Git metadata from cloned repository"
            cd "$CI_PIPELINE_REPOSITORY_DIR" && rm -rf .git

            echo "[INFO] Returning to project directory"
            cd "$CI_PROJECT_DIR"

.collect_maven_release_artifacts: &collect_maven_release_artifacts
    script:
        - |
            set -Eeo pipefail
            trap 'echo "[ERROR] $BASH_COMMAND (exit=$?)" >&2' ERR

            PROJECT_ROOT="${ANDROID_PROJECT_PATH:-${CI_PROJECT_DIR}}"
            mkdir -p "${RELEASE_PATH}"

            normalize_release_key() {
                local file_name stem base_name variant
                file_name="$(basename "$1")"
                stem="${file_name%.aar}"
                base_name="${stem}"
                variant="generic"

                case "${stem}" in
                    *-debug*)   base_name="${stem%%-debug*}"   ; variant="debug" ;;
                    *-homolog*) base_name="${stem%%-homolog*}" ; variant="homolog" ;;
                    *-release*) base_name="${stem%%-release*}" ; variant="release" ;;
                esac

                printf '%s|%s\n' "${base_name}" "${variant}"
            }

            has_equivalent_release_aar() {
                local aar_path="$1"
                local candidate_key existing_release_aar

                candidate_key="$(normalize_release_key "${aar_path}")"
                for existing_release_aar in "${existing_release_aars[@]:-}"; do
                    [[ "$(normalize_release_key "${existing_release_aar}")" == "${candidate_key}" ]] && return 0
                done
                return 1
            }

            prune_duplicate_release_aars() {
                local aar key current_name preferred_name preferred_aar
                declare -A preferred_by_key=()
                declare -A preferred_name_by_key=()

                mapfile -t existing_release_aars < <(
                    find "${RELEASE_PATH}" -maxdepth 1 -type f -name '*.aar' 2>/dev/null | sort -u
                )

                for aar in "${existing_release_aars[@]}"; do
                    key="$(normalize_release_key "${aar}")"
                    current_name="$(basename "${aar}")"

                    if [[ -z "${preferred_by_key[$key]+x}" ]]; then
                        preferred_by_key["${key}"]="${aar}"
                        preferred_name_by_key["${key}"]="${current_name}"
                        continue
                    fi

                    preferred_name="${preferred_name_by_key[$key]}"
                    if [[ "${#current_name}" -gt "${#preferred_name}" ]]; then
                        preferred_by_key["${key}"]="${aar}"
                        preferred_name_by_key["${key}"]="${current_name}"
                    fi
                done

                for aar in "${existing_release_aars[@]}"; do
                    key="$(normalize_release_key "${aar}")"
                    preferred_aar="${preferred_by_key[$key]}"
                    if [[ "${aar}" == "${preferred_aar}" ]]; then
                        continue
                    fi

                    echo "[INFO] Removing duplicate release AAR $(basename "${aar}") in favor of $(basename "${preferred_aar}")"
                    rm -f "${aar}" "${RELEASE_PATH}/$(basename "${aar}" .aar).pom"
                done

                mapfile -t existing_release_aars < <(
                    find "${RELEASE_PATH}" -maxdepth 1 -type f -name '*.aar' 2>/dev/null | sort -u
                )
            }

            normalize_pom_for_publish() {
                local pom_source="$1"
                local pom_target="$2"

                if [[ "${pom_source}" != "${pom_target}" ]]; then
                    cp -f "${pom_source}" "${pom_target}"
                fi

                if command -v perl >/dev/null 2>&1; then
                    perl -0pi -e 's/\sxmlns="http:\/\/maven\.apache\.org\/POM\/4\.0\.0"//' "${pom_target}"
                fi
            }

            extract_root_pom_value() {
                local pom_path="$1"
                local tag_name="$2"

                grep -o -m 1 "<${tag_name}>[^<]*</${tag_name}>" "${pom_path}" 2>/dev/null \
                    | sed -E "s#<${tag_name}>([^<]*)</${tag_name}>#\\1#"
            }

            pom_matches_artifact_hint() {
                local pom_path="$1"
                local artifact_hint="$2"
                local root_artifact_id

                root_artifact_id="$(extract_root_pom_value "${pom_path}" artifactId)"
                [[ -n "${root_artifact_id}" && "${root_artifact_id}" == "${artifact_hint}" ]]
            }

            resolve_pom_for_aar() {
                local aar_path="$1"
                local module_dir_hint="${2:-}"
                local aar_name artifact_hint preferred_pattern candidate pom_file

                aar_name="$(basename "${aar_path}")"
                artifact_hint="${aar_name%.aar}"
                artifact_hint="${artifact_hint%%-debug*}"
                artifact_hint="${artifact_hint%%-homolog*}"
                artifact_hint="${artifact_hint%%-release*}"

                preferred_pattern='development|debug'
                case "${aar_name}" in
                    *homolog*) preferred_pattern='quality|homolog' ;;
                    *release*) preferred_pattern='production|release' ;;
                esac

                pom_file=""

                if [[ -n "${module_dir_hint}" && -d "${module_dir_hint}/build/publications" ]]; then
                    while IFS= read -r candidate; do
                        if pom_matches_artifact_hint "${candidate}" "${artifact_hint}"; then
                            pom_file="${candidate}"
                            if [[ "${candidate}" =~ /(${preferred_pattern})/ ]]; then
                                break
                            fi
                        fi
                    done < <(
                        find "${module_dir_hint}/build/publications" \
                            -type f \
                            \( -name 'pom-default.xml' -o -name 'pom*.xml' -o -name '*.pom' \) \
                            2>/dev/null | sort
                    )
                fi

                if [[ -z "${pom_file}" ]]; then
                    while IFS= read -r candidate; do
                        if pom_matches_artifact_hint "${candidate}" "${artifact_hint}"; then
                            pom_file="${candidate}"
                            if [[ "${candidate}" =~ /(${preferred_pattern})/ ]]; then
                                break
                            fi
                        fi
                    done < <(
                        find "${PROJECT_ROOT}" \
                            -type f \
                            -path '*/build/publications/*' \
                            \( -name 'pom-default.xml' -o -name 'pom*.xml' -o -name '*.pom' \) \
                            2>/dev/null | sort
                    )
                fi

                if [[ -n "${pom_file}" && -f "${pom_file}" ]]; then
                    printf '%s\n' "${pom_file}"
                fi
            }

            echo "[STEP] Collecting Maven artifacts into ${RELEASE_PATH}"
            mapfile -t module_aars < <(
                find "${PROJECT_ROOT}" \
                    -type f \
                    -path '*/build/outputs/aar/*.aar' \
                    ! -path "${RELEASE_PATH}/*" \
                    ! -path '*/.gradle/*' \
                    2>/dev/null | sort -u
            )
            prune_duplicate_release_aars

            total_candidate_aars=$(( ${#module_aars[@]} + ${#existing_release_aars[@]} ))
            poms_already_generated=false
            if find "${PROJECT_ROOT}" \
                -type f \
                -path '*/build/publications/*' \
                \( -name 'pom-default.xml' -o -name 'pom*.xml' -o -name '*.pom' \) \
                -print -quit 2>/dev/null | grep -q .; then
                poms_already_generated=true
            fi

            if [[ "${total_candidate_aars}" -gt 0 && "${poms_already_generated}" == "false" ]]; then
                echo "[INFO] AARs found without generated POMs. Attempting to generate POM files with Gradle."
                if [[ -f "${PROJECT_ROOT}/gradlew" ]]; then
                    (
                        set +e
                        cd "${PROJECT_ROOT}" || exit 0
                        chmod +x ./gradlew || true

                        mapfile -t pom_tasks < <(
                            ./gradlew tasks --all --console=plain 2>/dev/null \
                                | grep 'generatePomFileFor.*Publication' \
                                | awk '{print $1}' \
                                | sed 's/^[[:space:]]*//' \
                                | sort -u
                        )

                        if [[ "${#pom_tasks[@]}" -gt 0 ]]; then
                            echo "[INFO] Running Gradle POM tasks: ${pom_tasks[*]}"
                            ./gradlew "${pom_tasks[@]}" \
                                -PmavenUser="${ANDROID_MAVEN_PULL_USER}" \
                                -PmavenPassword="${ANDROID_MAVEN_PULL_USER_TOKEN}" \
                                --no-daemon \
                                --console=plain
                        else
                            echo "[WARN] No generatePomFileFor*Publication tasks were discovered."
                        fi
                    ) || echo "[WARN] Automatic POM generation failed. Continuing with the collected artifacts."
                else
                    echo "[WARN] gradlew was not found at ${PROJECT_ROOT}. Skipping automatic POM generation."
                fi
            fi

            copied_aars=0
            copied_poms=0

            for aar in "${module_aars[@]}"; do
                aar_name="$(basename "${aar}")"
                module_dir="${aar%/build/outputs/aar/*}"
                [[ "${module_dir}" == "${aar}" ]] && module_dir=""

                if has_equivalent_release_aar "${aar}"; then
                    echo "[INFO] Skipping ${aar_name} because RELEASE_PATH already has an equivalent AAR."
                    continue
                fi

                echo "[INFO] Copying AAR ${aar_name} into ${RELEASE_PATH}"
                cp -f "${aar}" "${RELEASE_PATH}/${aar_name}"
                existing_release_aars+=("${RELEASE_PATH}/${aar_name}")
                copied_aars=$((copied_aars + 1))

                pom_file="$(resolve_pom_for_aar "${aar}" "${module_dir}")"
                if [[ -n "${pom_file}" ]]; then
                    normalize_pom_for_publish "${pom_file}" "${RELEASE_PATH}/${aar_name%.aar}.pom"
                    copied_poms=$((copied_poms + 1))
                    echo "[INFO] Paired ${aar_name} with $(basename "${pom_file}")"
                else
                    echo "[WARN] No POM found for ${aar}"
                fi
            done

            mapfile -t release_poms < <(find "${RELEASE_PATH}" -maxdepth 1 -type f -name '*.pom' 2>/dev/null | sort -u)
            for pom in "${release_poms[@]}"; do
                normalize_pom_for_publish "${pom}" "${pom}"
            done

            mapfile -t release_aars < <(find "${RELEASE_PATH}" -maxdepth 1 -type f -name '*.aar' 2>/dev/null | sort -u)
            for aar in "${release_aars[@]}"; do
                pom_target="${RELEASE_PATH}/$(basename "${aar}" .aar).pom"
                if [[ -f "${pom_target}" ]]; then
                    continue
                fi

                pom_file="$(resolve_pom_for_aar "${aar}")"
                if [[ -n "${pom_file}" ]]; then
                    normalize_pom_for_publish "${pom_file}" "${pom_target}"
                    copied_poms=$((copied_poms + 1))
                    echo "[INFO] Recovered missing POM for $(basename "${aar}")"
                else
                    echo "[WARN] Release artifact $(basename "${aar}") still has no matching POM."
                fi
            done

            echo "[INFO] Maven artifacts ready in ${RELEASE_PATH}: AAR=${copied_aars}, POM=${copied_poms}"

.get_tag: &get_tag
    before_script:
        - |
            # DEBUG
            set -x

            echo "[INFO] Fetching Git tags from remote repository"
            git fetch --tags --quiet

            echo "[INFO] Getting the latest tag from current branch"

            COMMIT_SHORT="$(git rev-parse --short HEAD)"

            echo "[DEBUG] COMMIT_SHORT == '${COMMIT_SHORT}'"

            TAGS_ON_COMMIT="$(git tag --contains "$COMMIT_SHORT" || true)"

            echo "[DEBUG] TAGS_ON_COMMIT == '${TAGS_ON_COMMIT}'"

            set +o pipefail
            if [[ $RUN_FEATURE_PIPELINE == "false" ]]; then
                CURRENT_TAG=$( \
                  printf '%s\n' "$TAGS_ON_COMMIT" \
                  | grep -E '^v[0-9]+' \
                  | grep -Ev 'b[0-9]+$' \
                  | sort -V \
                  | tail -n 1 \
                )
                echo "[DEBUG 0] CURRENT_TAG == '${CURRENT_TAG}'"
            else
                CURRENT_TAG=$( \
                  printf '%s\n' "$TAGS_ON_COMMIT" \
                  | grep -E '^v[0-9]+' \
                  | sort -V \
                  | tail -n 1 \
                )
            fi

            echo "[DEBUG] CURRENT_TAG == '${CURRENT_TAG}'"

            if [[ -z "$CURRENT_TAG" ]]; then
                CURRENT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            fi

            if [[ -z "$CURRENT_TAG" ]]; then
                echo "[INFO] No existing tags found. Generating temporal tag based on pipeline creation date"
                DATE_FORMAT="$(date -d "${CI_PIPELINE_CREATED_AT}" +'%Y%m%d_%H%M%S')"
                CURRENT_TAG="${TEMPORAL_TAG_PREFIX}_${DATE_FORMAT}"
                echo "[INFO] Creating new temporal tag: $CURRENT_TAG"
                git tag "$CURRENT_TAG"
            fi

            echo "[INFO] Last tag retrieved from branch $GITLAB_BRANCH: $CURRENT_TAG"
            echo "CURRENT_TAG=$CURRENT_TAG" >> build.env

