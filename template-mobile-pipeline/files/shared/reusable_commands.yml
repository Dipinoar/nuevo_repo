.install_pipeline_python_deps: &install_pipeline_python_deps
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      echo "[INFO] Installing Python dependencies for pipeline helpers"
      if python3 -m pip --version >/dev/null 2>&1; then
        python3 -m pip install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum \
          || python3 -m pip install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum
      elif command -v pip3 >/dev/null 2>&1; then
        pip3 install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum \
          || pip3 install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum
      elif command -v pip >/dev/null 2>&1; then
        pip install --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum \
          || pip install --break-system-packages --no-cache-dir python-gitlab PyYAML boto3 python-dotenv StrEnum
      else
        echo "[ERROR] No pip executable available in runner image"
        exit 1
      fi

.ensure_android_sdk: &ensure_android_sdk
  script:
    - |
      set -Eeo pipefail
      trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

      SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
      if [ -z "$SDK_PATH" ]; then
        echo "[ERROR] ANDROID_SDK_ROOT/ANDROID_HOME is not defined"
        exit 1
      fi

      export ANDROID_HOME="$SDK_PATH"
      export ANDROID_SDK_ROOT="$SDK_PATH"

      if [ ! -d "$SDK_PATH" ]; then
        echo "[ERROR] Android SDK directory not found at $SDK_PATH"
        exit 1
      fi

      printf "sdk.dir=%s\n" "$SDK_PATH" > local.properties
      echo "[INFO] Android SDK configured at $SDK_PATH"
      echo "[INFO] local.properties generated for Gradle"

