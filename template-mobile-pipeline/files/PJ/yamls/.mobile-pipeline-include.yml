include:
  # LOCAL
  - local: 'files/PJ/yamls/.mobile-pipeline-variables.yml'
  - local: 'files/PJ/yamls/.mobile-pipeline-workflow.yml'

  # SHARED
  - local: 'files/shared/reusable_commands.yml'
  - local: 'files/shared/rules_components.yml'
  - local: 'files/shared/check_rebase.yml'
  - local: 'files/shared/calculate_version.yml'

  # PF ANCHORS (shared)
  - local: 'files/PF/anchors/gradle_test.yml'

  # PJ ANCHORS
  - local: 'files/PJ/anchors/before_script.yml'
  - local: 'files/PJ/anchors/download_cacerts.yml'
  - local: 'files/PJ/anchors/init_ssh_agent_guardsquare.yml'
  - local: 'files/PJ/anchors/prebuild_android_application.yml'
  - local: 'files/PJ/anchors/prepare_environment.yml'
  - local: 'files/PJ/anchors/prepare_recover_package_scripts.yml'
  - local: 'files/PJ/anchors/release_android_application.yml'
  - local: 'files/PJ/anchors/release_android_library.yml'
  - local: 'files/PJ/anchors/scan_android_application_unpinned.yml'
  - local: 'files/PJ/anchors/scan_android_library_unpinned.yml'
  - local: 'files/PJ/anchors/scan_android_library.yml'
  - local: 'files/PJ/anchors/copy_gradle_module_metadata.yml'
  - local: 'files/PJ/anchors/set_environment_variables.yml'
  - local: 'files/PJ/anchors/set_java_version.yml'
  - local: 'files/PJ/anchors/setup_android_linux_env.yml'
  - local: 'files/PJ/anchors/test_and_build.yml'
  - local: 'files/PJ/anchors/build_and_publish_sequential.yml'
  - local: 'files/PJ/anchors/upload_android_library.yml'
  - local: 'files/PJ/anchors/upload_application.yml'
  - local: 'files/PJ/anchors/verify_package_registry.yml'

  # UPLOAD INSTRUMENTED
  - component: $CI_SERVER_FQDN/arq-devops-team/itau-components/componente-package-registry/uploadv2@main
    inputs:
      stage: special_builds
      job_name: 9.2 Upload Instrumented to Package Registry
      target_project_id: ${PACKAGE_REGISTRY_ID}
      gitlab_url: ${CI_SERVER_URL}
      image: $RUNNER_ANDROID_SECURE
      auth_method: "custom_token"
      custom_token_var: "GITLAB_PACKAGE_TOKEN"
      file_pattern: "${FILE_PATTERN}"
      base_directory: "downloaded_packages"
      package_name: "${CI_PROJECT_NAME}"
      package_version: "${VERSION}"
      rules:
        - !reference [.rules_skip_on_tag, rules]
        - !reference [.rules_instrumented_to_quality, rules]
        - !reference [.rules_instrumented_to_production, rules]
      retry_max: 2
