.set_environment_variables: &set_environment_variables
    before_script:
        - |
            set -Eeo pipefail
            trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

            # Allow per-job override of the workflow-selected ENVIRONMENT_SUFFIX
            # (used by 4.1 Build DEV / 4.2 Build QA to build a non-target env in the same MR pipeline).
            if [[ -n "${BUILD_ENV_SUFFIX:-}" ]]; then
              echo "[INFO] Overriding ENVIRONMENT_SUFFIX from workflow ('${ENVIRONMENT_SUFFIX:-}') to job-local value ('${BUILD_ENV_SUFFIX}')"
              ENVIRONMENT_SUFFIX="${BUILD_ENV_SUFFIX}"
              export ENVIRONMENT_SUFFIX

              # Source the matching per-env file produced by 2.4 Prepare Environment
              # so PIPELINE_PROJECT_*_<ENV> keys are available even when the workflow
              # targets a different env.
              env_lower=$(echo "${BUILD_ENV_SUFFIX#_}" | tr '[:upper:]' '[:lower:]')
              env_file="build.${env_lower}.env"
              if [[ -f "${env_file}" ]]; then
                echo "[INFO] Sourcing per-env config from ${env_file}"
                set -a
                # shellcheck disable=SC1090
                source "${env_file}"
                set +a
              else
                echo "[WARN] ${env_file} not found; PIPELINE_PROJECT_*${BUILD_ENV_SUFFIX} keys may be missing."
              fi
            fi

            echo "Set variables per environment"
            PIPELINE_PROJECT_TEST="PIPELINE_PROJECT_TEST${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_BUILD="PIPELINE_PROJECT_BUILD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_POMGEN="PIPELINE_PROJECT_PUBLISH_POMGEN${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_OUTPUT="PIPELINE_PROJECT_PUBLISH_OUTPUT${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_COMMAND="PIPELINE_PROJECT_PUBLISH_COMMAND${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_PROFILE_TYPE="PIPELINE_PROJECT_PUBLISH_PROFILE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_PROFILE_SOURCE="PIPELINE_PROJECT_PUBLISH_PROFILE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_PROFILE_PASSWORD="PIPELINE_PROJECT_PUBLISH_PROFILE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_CERTIFICATE_TYPE="PIPELINE_PROJECT_PUBLISH_CERTIFICATE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_CERTIFICATE_SOURCE="PIPELINE_PROJECT_PUBLISH_CERTIFICATE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_CERTIFICATE_PASSWORD="PIPELINE_PROJECT_PUBLISH_CERTIFICATE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_PUBLISH_FOLDER_REF="PIPELINE_PROJECT_PUBLISH_FOLDER_REF${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_POMGEN="PIPELINE_PROJECT_SCAN_POMGEN${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_OUTPUT="PIPELINE_PROJECT_SCAN_OUTPUT${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_COMMAND="PIPELINE_PROJECT_SCAN_COMMAND${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_PROFILE_TYPE="PIPELINE_PROJECT_SCAN_PROFILE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_PROFILE_SOURCE="PIPELINE_PROJECT_SCAN_PROFILE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_PROFILE_PASSWORD="PIPELINE_PROJECT_SCAN_PROFILE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_CERTIFICATE_TYPE="PIPELINE_PROJECT_SCAN_CERTIFICATE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_CERTIFICATE_SOURCE="PIPELINE_PROJECT_SCAN_CERTIFICATE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_CERTIFICATE_PASSWORD="PIPELINE_PROJECT_SCAN_CERTIFICATE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_SCAN_FOLDER_REF="PIPELINE_PROJECT_SCAN_FOLDER_REF${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_ENABLED="PIPELINE_PROJECT_INSTRUMENTED_ENABLED${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_POMGEN="PIPELINE_PROJECT_INSTRUMENTED_POMGEN${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_OUTPUT="PIPELINE_PROJECT_INSTRUMENTED_OUTPUT${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_COMMAND="PIPELINE_PROJECT_INSTRUMENTED_COMMAND${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_PROFILE_TYPE="PIPELINE_PROJECT_INSTRUMENTED_PROFILE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_PROFILE_SOURCE="PIPELINE_PROJECT_INSTRUMENTED_PROFILE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_PROFILE_PASSWORD="PIPELINE_PROJECT_INSTRUMENTED_PROFILE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_TYPE="PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_TYPE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_SOURCE="PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_SOURCE${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_PASSWORD="PIPELINE_PROJECT_INSTRUMENTED_CERTIFICATE_PASSWORD${ENVIRONMENT_SUFFIX}"
            PIPELINE_PROJECT_INSTRUMENTED_FOLDER_REF="PIPELINE_PROJECT_INSTRUMENTED_FOLDER_REF${ENVIRONMENT_SUFFIX}"
            AWS_SECRET_ROLE="AWS_SECRET_ROLE${ENVIRONMENT_SUFFIX}"
