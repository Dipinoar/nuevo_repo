# Copy Gradle Module Metadata (.module) files from build publications directory to release directory.
# Expects RELEASE_DIRECTORY to be set and .aar/.pom files to already be copied there.
# The .module file is generated by Gradle's generateMetadataFileFor*Publication task
# and placed in build/publications/<publication-name>/module.json
.copy_gradle_module_metadata: &copy_gradle_module_metadata
    script:
        - |
            set -Eeo pipefail
            trap 'echo "[ERROR] Command failed: $BASH_COMMAND (exitcode=$?)" >&2' ERR

            echo "[INFO!] Searching for Gradle Module Metadata (.module) files"
            for pom_file in $(find "${RELEASE_DIRECTORY}" -type f -name "*.pom"); do
                artifact_dir=$(dirname "$pom_file")
                base_name=$(basename "$pom_file" .pom)

                # Gradle generates module.json in build/publications/<name>/
                module_file=$(find . -path "*/build/publications/*/module.json" -print -quit 2>/dev/null || true)
                if [ -f "$module_file" ]; then
                    cp "$module_file" "${artifact_dir}/${base_name}.module"
                    echo "[INFO!] Copied Gradle Module Metadata: $module_file -> ${artifact_dir}/${base_name}.module"
                else
                    echo "[WARN] No Gradle Module Metadata (module.json) found in build/publications/"
                fi
            done
