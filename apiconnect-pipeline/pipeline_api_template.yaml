set-env-vars:
  stage: compliance
  script:
    - echo "COMPLIANCE_TECNOLOGY=apiconnect" >> compliance.env
    - echo "COMPLIANCE_LANGUAGES=openapi" >> compliance.env
    - echo "COMPLIANCE_PROJECT=$CI_PROJECT_PATH" >> compliance.env
  artifacts:
    reports:
      dotenv: compliance.env
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"


run-compliance:
  stage: compliance
  needs: [set-env-vars]
  allow_failure: true
  trigger:
    project: arq-devops-team/pipelines-gitlab/rule-validation
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  variables:
    REPO_ID: $CI_PROJECT_ID
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"

set_vars:
  stage: set_vars
  script:
    - ls -lah
    - pwd
    - printenv
    - python3 CICD/src/SetVars.py
  artifacts:
    paths:
      - detail_vars.yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"
    - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "quality" || $CI_COMMIT_BRANCH == "production")

check_product:
  stage: check_product
  script:
    - ls -lah
    - python3 CICD/src/CheckProduct.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development")

# inicia stage veracode

package-apiconnect-prd:
  stage: veracode-prd
  allow_failure: false
  script:
    - printenv
    - echo "[VERACODE] - inicio de proceso"
    - curl -fSs https://tools.veracode.com/veracode-cli/install | sh && mv veracode ../
    - mv CICD ../
    - export VERACODE_API_KEY_ID=$VERACODE_ID
    - export VERACODE_API_KEY_SECRET=$VERACODO_SECRET
    - ls
    - cd ..
    - ls
    - echo $CI_PROJECT_NAME
    - ls
    - mkdir $CI_PROJECT_NAME-autopack/
    - set +e
    - output_veracode=$(./veracode package -s $CI_PROJECT_NAME -t directory -o $CI_PROJECT_NAME-autopack -a --strict 2>&1)
    - exit_code=$?
    - set -e
    - echo $output_veracode
    - ls
    - echo $exit_code
    - ls -ltr
    - ls
    - ls -1 $CI_PROJECT_NAME-autopack | wc -l
    - |
      if [ "$(ls -1 $CI_PROJECT_NAME-autopack | wc -l)" -eq 0 ]; then
        echo "VERACODE_APP_TYPE=emptyproject" >> "build.env"
      else
        echo "VERACODE_APP_TYPE=application" >> "build.env"
      fi
    - touch $CI_PROJECT_NAME-autopack/$CI_PROJECT_NAME.zip
    - |
      PROJECT_VERSION=1.0.0
      echo "CI_ARTIFACT_JOB_ID=${CI_JOB_ID}" >> build.env
      echo "CI_ARTIFACT_PROJECT_SOURCE=apiconnect" >> build.env
      echo "CI_ARTIFACT_VERSION=${PROJECT_VERSION}" >> "build.env"
      echo "VERACODE_APPNAME=$CI_PROJECT_PATH" >> "build.env"
      echo "VERACODE_ARTIFACT=$CI_PROJECT_NAME" >> "build.env"
      echo "VERACODE_MODO_WARNING=$VERACODE_MODO_WARNING" >> "build.env"
      echo "VERACODE_APP_NAMESPACE=$CI_PROJECT_NAMESPACE" >> "build.env"
      echo "ACE12_ARTIFACT=TRUE" >> "build.env"
    - mv build.env $CI_PROJECT_NAME/
    - cat $CI_PROJECT_NAME/build.env
    - ls -a
    - mv $CI_PROJECT_NAME-autopack/ $CI_PROJECT_NAME/
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - $CI_PROJECT_NAME-autopack/*.zip
      - build.env
    expire_in: 1 hour
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "production")
      when: always
    - when: never


check-artifact-gate-prd:
  stage: veracode-prd
  needs:
    - job: package-apiconnect-prd
      artifacts: true
  script:
    - ls -a
    - cat build.env
    - "if [ \"$ACE12_ARTIFACT\" != \"TRUE\" ]; then\n  echo \"No artifacts to send.\
      \ Skipping downstream process.\"\n  exit 1\nfi\n"
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "production")
      when: always
    - when: never

send-to-veracode-prd:
  stage: veracode-prd
  needs:
    - job: check-artifact-gate-prd
  trigger:
    project: arq-devops-team/pipelines-gitlab/template-pipeline-veracode
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  variables:
    VERACODE_FILEPATH: artifact/$VERACODE_ARTIFACT-autopack/
    VERACODE_APPNAME_FLAG: appiconnect
    CI_ARTIFACT_PROJECT_ID: "${CI_PROJECT_ID}"
    CI_ARTIFACT_PIPELINE_ID: "${CI_PIPELINE_ID}"
    VERACODE_APP_TYPE: "application"
  allow_failure: false
  rules:
    - if: ($CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "production")
      when: always
    - when: never

package-apiconnect-devenv:
  stage: veracode-devenv
  allow_failure: true
  script:
    - printenv
    - echo "[VERACODE] - inicio de proceso"
    - curl -fSs https://tools.veracode.com/veracode-cli/install | sh && mv veracode ../
    - mv CICD ../
    - export VERACODE_API_KEY_ID=$VERACODE_ID
    - export VERACODE_API_KEY_SECRET=$VERACODO_SECRET
    - ls
    - cd ..
    - ls
    - echo $CI_PROJECT_NAME
    - ls
    - mkdir $CI_PROJECT_NAME-autopack/
    - set +e
    - output_veracode=$(./veracode package -s $CI_PROJECT_NAME -t directory -o $CI_PROJECT_NAME-autopack -a --strict 2>&1)
    - exit_code=$?
    - set -e
    - echo $output_veracode
    - ls
    - echo $exit_code
    - ls -ltr
    - ls
    - ls -1 $CI_PROJECT_NAME-autopack | wc -l
    - |
      if [ "$(ls -1 $CI_PROJECT_NAME-autopack | wc -l)" -eq 0 ]; then
        echo "VERACODE_APP_TYPE=emptyproject" >> "build.env"
      else
        echo "VERACODE_APP_TYPE=application" >> "build.env"
      fi
    - touch $CI_PROJECT_NAME-autopack/$CI_PROJECT_NAME.zip
    - |
      PROJECT_VERSION=1.0.0
      echo "CI_ARTIFACT_JOB_ID=${CI_JOB_ID}" >> build.env
      echo "CI_ARTIFACT_PROJECT_SOURCE=apiconnect" >> build.env
      echo "CI_ARTIFACT_VERSION=${PROJECT_VERSION}" >> "build.env"
      echo "VERACODE_APPNAME=$CI_PROJECT_PATH" >> "build.env"
      echo "VERACODE_ARTIFACT=$CI_PROJECT_NAME" >> "build.env"
      echo "VERACODE_MODO_WARNING=$VERACODE_MODO_WARNING" >> "build.env"
      echo "VERACODE_APP_NAMESPACE=$CI_PROJECT_NAMESPACE" >> "build.env"
      echo "ACE12_ARTIFACT=TRUE" >> "build.env"
    - mv build.env $CI_PROJECT_NAME/
    - cat $CI_PROJECT_NAME/build.env
    - ls -a
    - mv $CI_PROJECT_NAME-autopack/ $CI_PROJECT_NAME/
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - $CI_PROJECT_NAME-autopack/*.zip
      - build.env
    expire_in: 1 hour
  rules:
    - if: ($CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "quality")
      when: always
    - when: never

check-artifact-gate-devenv:
  stage: veracode-devenv
  allow_failure: true
  needs:
    - job: package-apiconnect-devenv
      artifacts: true
  script:
    - ls -a
    - cat build.env
    - "if [ \"$ACE12_ARTIFACT\" != \"TRUE\" ]; then\n  echo \"No artifacts to send.\
      \ Skipping downstream process.\"\n  exit 1\nfi\n"
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: ($CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "quality")
      when: always
    - when: never

send-to-veracode-devenv:
  stage: veracode-devenv
  needs:
    - job: check-artifact-gate-devenv
  trigger:
    project: arq-devops-team/pipelines-gitlab/template-pipeline-veracode
    branch: main
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  variables:
    VERACODE_FILEPATH: artifact/$VERACODE_ARTIFACT-autopack/
    VERACODE_APPNAME_FLAG: appiconnect
    CI_ARTIFACT_PROJECT_ID: "${CI_PROJECT_ID}"
    CI_ARTIFACT_PIPELINE_ID: "${CI_PIPELINE_ID}"
    VERACODE_APP_TYPE: "application"
  allow_failure: true
  rules:
    - if: ($CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "quality")
      when: always
    - when: never

# termino stage veracode

#
deploy:
  stage: deploy
  script:
    - python3 CICD/src/ReplaceSecrets.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"
    - if: $CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "quality" || $CI_COMMIT_BRANCH == "production")
  artifacts:
    paths:
      - varReplace.yaml
      - subsOldVersion.yaml

